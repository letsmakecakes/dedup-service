# Nginx test config for dedup-service X-Accel-Redirect mode via Docker.
#
# Flow:
#   Client → Nginx (:80) → dedup-service (host:8081) → reads body, checks Redis
#     If allowed:  200 + X-Accel-Redirect → Nginx → mock backend (host:9000)
#     If duplicate: 409 → returned to client
#
# Env var on dedup-service:
#   DEDUP_PROXY_X_ACCEL_REDIRECT_PREFIX=/internal/upstream

client_body_buffer_size      64k;
client_max_body_size         10m;

upstream dedup_service {
    server host.docker.internal:8081;
    keepalive 32;
}

upstream mock_backend {
    server host.docker.internal:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Health/metrics bypass dedup ───────────────────────────────────────────
    location = /healthz {
        proxy_pass http://dedup_service/healthz;
    }

    # ── All API requests go to dedup-service for checking ─────────────────────
    # Nginx sends the full request (method, URI, headers, body) to the Go
    # dedup service. The service fingerprints method+URI+body and returns:
    #   200 + X-Accel-Redirect header → Nginx forwards to mock_backend
    #   409                           → returned directly to client
    location / {
        # Save the original method before X-Accel-Redirect changes it to GET.
        set $original_method $request_method;

        proxy_pass              http://dedup_service;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      30s;
        proxy_send_timeout      30s;
        proxy_connect_timeout   5s;
    }

    # ── Internal: proxy to real upstream (only via X-Accel-Redirect) ──────────
    # When the dedup service allows a request, it returns:
    #   X-Accel-Redirect: /internal/upstream{original_URI}
    # Nginx strips the prefix and proxies to the real backend.
    # The original HTTP method and request body are preserved.
    location /internal/upstream {
        internal;

        # Strip the /internal/upstream prefix, keep the original URI.
        rewrite ^/internal/upstream(.*)$ $1 break;

        # Restore the original HTTP method (X-Accel-Redirect changes it to GET).
        proxy_method            $original_method;

        proxy_pass              http://mock_backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      30s;
        proxy_send_timeout      30s;
        proxy_connect_timeout   5s;
    }
}
