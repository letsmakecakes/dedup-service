# =============================================================================
# Nginx API Gateway – Request Deduplication (X-Accel-Redirect mode)
# =============================================================================
#
# How it works:
#   1. Nginx sends the full client request (method, URI, headers, body) to the
#      Go dedup service via proxy_pass.
#   2. The Go service fingerprints:  SHA-256( Method | URI+Query | Body )
#   3. If allowed:  returns 200 + X-Accel-Redirect header → Nginx internally
#                   redirects to the upstream backend (method & body preserved).
#      If duplicate: returns 409 Conflict with JSON body → returned to client.
#
#   NOTE: Client IP is intentionally excluded from the fingerprint.
#         Per-caller isolation relies on the Authorization header.
#         For unauthenticated routes, exclude the route entirely
#         (see commented example below).
#
#   Config key: "proxy": { "x_accel_redirect_prefix": "/internal/upstream" }
#
#   If Redis is unreachable and dedup.fail_open=true → request is allowed.
# =============================================================================

# ── Body buffering ────────────────────────────────────────────────────────────
# Bodies up to this size are held in memory; larger bodies are spilled to disk.
# The dedup service hashes the full body regardless of size.
client_body_buffer_size   64k;
client_max_body_size      10m;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream dedup_service {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream backend_service {
    # Replace with your actual upstream address(es).
    server 127.0.0.1:9000;
    keepalive 32;
}

# =============================================================================
# Server block
# =============================================================================
server {
    listen      80;
    server_name api.example.com;  # Replace with your domain.

    # ── Health / metrics pass-through (no dedup) ──────────────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://dedup_service/healthz;
    }

    location = /metrics {
        access_log off;
        proxy_pass http://dedup_service/metrics;
    }

    # ── Main API — all routes go through dedup service first ──────────────────
    # Nginx sends the full request (including body) to the dedup service.
    # The dedup service reads body, computes SHA-256(method|URI|body), checks Redis.
    # If allowed:  responds 200 + X-Accel-Redirect → Nginx forwards to upstream.
    # If duplicate: responds 409 → returned directly to client.
    location / {
        # Save the original method before X-Accel-Redirect changes it to GET.
        set $original_method $request_method;

        proxy_pass              http://dedup_service;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Body IS forwarded (proxy_pass_request_body defaults to "on").
        proxy_read_timeout      30s;
        proxy_send_timeout      30s;
        proxy_connect_timeout   5s;
    }

    # ── Optional: exclude unauthenticated/read-only routes from dedup ─────────
    # Duplicate detection without an Authorization header has global scope:
    # two different anonymous users posting the same body will collide.
    # Exclude such routes entirely via a direct proxy_pass block.
    #
    # location ~ ^/api/public/ {
    #     proxy_pass http://backend_service;
    # }

    # ── Internal: upstream proxy (only reachable via X-Accel-Redirect) ────────
    # When the dedup service allows a request, it returns:
    #   X-Accel-Redirect: /internal/upstream{original_URI}
    # Nginx strips the prefix and proxies to the real backend.
    # The original HTTP method and request body are preserved.
    location /internal/upstream {
        internal;

        # Strip the /internal/upstream prefix, keep the original URI.
        rewrite ^/internal/upstream(.*)$ $1 break;

        # Restore the original HTTP method (X-Accel-Redirect changes it to GET).
        proxy_method            $original_method;

        proxy_pass              http://backend_service;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      30s;
        proxy_send_timeout      30s;
        proxy_connect_timeout   5s;
    }
}
