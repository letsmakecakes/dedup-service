# =============================================================================
# Nginx API Gateway – Request Deduplication
# =============================================================================
#
# Requires: Nginx compiled with --with-http_auth_request_module
# Verify:   nginx -V 2>&1 | grep -o 'auth_request'
#
# How it works:
#   Every inbound request triggers an internal auth_request sub-request to the
#   Go dedup service. The request is forwarded as-is — no X-Original-* header
#   translation. The Go service fingerprints directly from:
#
#     SHA-256( Method | URI+Query | Authorization | [Session-Header] | Body )
#
#   NOTE: Client IP is intentionally excluded from the fingerprint.
#         Per-caller isolation relies on the Authorization header.
#         For unauthenticated routes, configure DEDUP_SESSION_HEADER or
#         exclude the route entirely (see commented example below).
#
#   If the fingerprint already exists in Redis → 409 Conflict.
#   If Redis is unreachable and DEDUP_FAIL_OPEN=true → request is allowed.
#
# Body forwarding:
#   Nginx must buffer the full request body before auth_request fires so it
#   can be forwarded to the dedup service for hashing.
#   Tune client_body_buffer_size to match your typical payload size.
#   Bodies exceeding client_body_buffer_size spill to client_body_temp_path.
# =============================================================================

# ── Body buffering ────────────────────────────────────────────────────────────
# Bodies up to this size are held in memory; larger bodies are spilled to disk.
# Match this to DEDUP_MAX_BODY_BYTES on the Go service (default 64 KB).
client_body_buffer_size   64k;
client_max_body_size      10m;

# ── Upstreams ─────────────────────────────────────────────────────────────────
upstream dedup_service {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream backend_service {
    # Replace with your actual upstream address(es).
    server 127.0.0.1:9000;
    keepalive 32;
}

# =============================================================================
# Server block
# =============================================================================
server {
    listen      80;
    server_name api.example.com;  # Replace with your domain.

    # ── Health / metrics pass-through (no dedup) ──────────────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://dedup_service/healthz;
    }

    # ── Main API — all routes pass through dedup ──────────────────────────────
    location / {
        # 1. Sub-request to dedup service. auth_request forwards response headers
        #    but NOT the response body to the client. Non-2xx responses abort the
        #    request with the status defined by error_page below.
        auth_request /internal/dedup-check;

        # 2. auth_request maps 409 → 403 internally; remap it back to 409 for
        #    the client response.
        error_page 403 = @duplicate_rejected;

        # 3. Proxy allowed requests to the backend.
        proxy_pass          http://backend_service;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    # ── Optional: exclude unauthenticated/read-only routes from dedup ─────────
    # Duplicate detection without an Authorization header has global scope:
    # two different anonymous users posting the same body will collide.
    # Exclude such routes explicitly, or configure DEDUP_SESSION_HEADER.
    #
    # location ~ ^/api/public/ {
    #     proxy_pass http://backend_service;
    # }

    # ── Internal: dedup sub-request ───────────────────────────────────────────
    # Reachable only by auth_request (internal;).
    #
    # The request is forwarded as-is to the Go dedup service: the original
    # method, URI, all headers (including Authorization), and body are passed
    # through unchanged. No X-Original-* translation headers are used.
    #
    # The Go service reads r.Method, r.RequestURI, r.Header, and r.Body
    # directly — exactly what Nginx received from the client.
    location = /internal/dedup-check {
        internal;

        # Rewrite the request line to the dedup endpoint but preserve everything else.
        proxy_pass            http://dedup_service/dedup-check;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host localhost;

        # Forward ALL original request headers unchanged (includes Authorization,
        # Content-Type, any session/device headers, etc.).
        proxy_pass_request_headers on;

        # Forward the raw request body. Nginx must have buffered it already
        # (see client_body_buffer_size at the top of this file).
        proxy_pass_request_body on;

        # Short timeouts — the dedup check must not add significant latency.
        # On timeout the auth_request fails; DEDUP_FAIL_OPEN on the Go service
        # determines whether the request is allowed or rejected.
        proxy_connect_timeout 1s;
        proxy_read_timeout    3s;
        proxy_send_timeout    3s;
    }

    # ── Duplicate rejection response ──────────────────────────────────────────
    location @duplicate_rejected {
        add_header Content-Type  "application/json; charset=utf-8" always;
        add_header Cache-Control "no-store, no-cache"              always;
        return 409 '{"error":"duplicate_request","message":"An identical request was received within the deduplication window. Please wait before retrying."}';
    }
}
