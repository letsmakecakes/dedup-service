services:
  dedup-service:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DEDUP_REDIS_ADDR=redis:6379

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dedup.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dedup-service
